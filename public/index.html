<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Translator</title>
</head>
<body>

<h2>Russian → English translator</h2>

<button id="start">Start microphone</button>
<br><br>

<label>Input:</label>
<select id="inputs"></select>
<br>

<label>Output:</label>
<select id="outputs"></select>

<script>
let ws;
let audioContext;
let micProcessor;
let playerProcessor;

const button = document.getElementById("start");
const outputs = document.getElementById("outputs");
const inputs = document.getElementById("inputs");

async function loadOutputs() {
    // Очищаем списки перед заполнением
    inputs.innerHTML = "";
    outputs.innerHTML = "";

    const devices = await navigator.mediaDevices.enumerateDevices();

    devices.forEach(d => {
        if (d.kind === "audioinput") {
            const o = document.createElement("option");
            o.value = d.deviceId;
            let label = d.label || `Microphone (${d.deviceId.slice(0, 5)}...)`;
            // Поясняем названия виртуальных кабелей
            if (label.includes("CABLE Output")) {
                label += " (Виртуальный кабель / Вход для перевода звука из программ)";
            }
            o.textContent = label;
            inputs.appendChild(o);
        }

        if (d.kind === "audiooutput") {
            const o = document.createElement("option");
            o.value = d.deviceId;
            let label = d.label || `Speaker (${d.deviceId.slice(0, 5)}...)`;
            // Поясняем названия виртуальных кабелей
            if (label.includes("CABLE Input")) {
                label += " (Виртуальный микрофон / Вывод звука в другие программы)";
            }
            o.textContent = label;
            outputs.appendChild(o);
        }
    });
}

button.onclick = async () => {
    console.log("START");

    const inputId = inputs.value;

    try {
        // Очищаем предыдущие ресурсы, чтобы не плодить утечки памяти и дублирующиеся потоки
        if (audioContext) {
            try {
                await audioContext.close();
            } catch (e) {
                console.error("Error closing old AudioContext:", e);
            }
        }
        if (ws) {
            try {
                ws.close();
            } catch (e) {
                console.error("Error closing old WebSocket:", e);
            }
        }

        const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
                // Используем ideal вместо exact, чтобы избежать OverconstrainedError
                deviceId: inputId ? { ideal: inputId } : undefined,
                channelCount: 1,
                echoCancellation: false,
                noiseSuppression: false
            }
        });

        console.log("MIC OK");

        ws = new WebSocket(`ws://${location.host}`);
        ws.binaryType = "arraybuffer";

        ws.onopen = () => {
            console.log("WS CONNECTED");
        };

        audioContext = new AudioContext({
            sampleRate: 16000
        });
        
        if (audioContext.state === "suspended") {
            await audioContext.resume();
        }

        console.log("Audio sample rate:", audioContext.sampleRate);

        await audioContext.audioWorklet.addModule("audio-worklet.js");
        await audioContext.audioWorklet.addModule("player-worklet.js");

        /* Микрофон */
        const source = audioContext.createMediaStreamSource(stream);
        micProcessor = new AudioWorkletNode(audioContext, "pcm-processor");

        micProcessor.port.onmessage = (event) => {
            if (ws.readyState === 1) {
                ws.send(event.data);
            }
        };

        // Подключаем микрофон к процессору для отправки данных, но НЕ подключаем к destination (чтобы не слышать себя)
        source.connect(micProcessor);

        /* Вывод */
        playerProcessor = new AudioWorkletNode(audioContext, "player-processor");
        
        // Создаем MediaStream destination для перенаправления вывода
        const mediaStreamDest = audioContext.createMediaStreamDestination();
        playerProcessor.connect(mediaStreamDest);

        // Находим или создаем невидимый HTML-элемент <audio> в DOM для надежного воспроизведения
        let audioEl = document.getElementById("hidden-player");
        if (!audioEl) {
            audioEl = document.createElement("audio");
            audioEl.id = "hidden-player";
            audioEl.style.display = "none";
            document.body.appendChild(audioEl);
        }
        audioEl.srcObject = mediaStreamDest.stream;
        audioEl.play().catch(err => console.error("Audio play error:", err));

        // Функция для надежного переключения устройства вывода
        const setOutputDevice = async (deviceId) => {
            if (!deviceId) return;
            
            console.log("Applying output device selection:", deviceId);

            // 1. В первую очередь задаем устройство для HTML-элемента <audio> (который реально воспроизводит звук)
            if (audioEl.setSinkId) {
                try {
                    await audioEl.setSinkId(deviceId);
                    console.log("HTMLAudioElement output device set successfully:", deviceId);
                } catch (err) {
                    console.error("Failed to set sinkId on HTMLAudioElement:", err);
                }
            } else {
                console.warn("setSinkId is not supported on HTMLMediaElement in this browser.");
            }

            // 2. Также дублируем для самого AudioContext (если поддерживается браузером)
            if (audioContext.setSinkId) {
                try {
                    await audioContext.setSinkId(deviceId);
                    console.log("AudioContext output device set successfully:", deviceId);
                } catch (err) {
                    console.warn("Failed to set sinkId on AudioContext:", err);
                }
            }
        };

        // Задаем начальное устройство вывода
        if (outputs.value) {
            await setOutputDevice(outputs.value);
        }

        // Обновляем устройство при изменении в выпадающем списке
        outputs.onchange = async () => {
            await setOutputDevice(outputs.value);
        };

        ws.onmessage = (event) => {
            console.log("AUDIO RECEIVED", event.data.byteLength);
            playerProcessor.port.postMessage(event.data);
        };

    } catch (err) {
        console.error("Error starting audio stream:", err);
    }
};

// Инициализация при загрузке страницы
async function init() {
    try {
        // Запрашиваем доступ к мику сразу, чтобы enumerateDevices() вернул реальные лейблы устройств
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        // Гасим временный стрим
        stream.getTracks().forEach(track => track.stop());
    } catch (e) {
        console.warn("Permission denied or no microphone found context:", e);
    }

    // Загружаем устройства в select-боксы
    await loadOutputs();
    console.log("READY");
}

init();
</script>

</body>
</html>
